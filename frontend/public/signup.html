<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up — GameHub</title>
  <link rel="stylesheet" href="../src/css/style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <header>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="tictactoe.html">Tic Tac Toe</a>
      <a href="2048.html">2048</a>
      <a href="dino.html">Dino</a>
      <a href="tanks.html">Tanks</a>
      <a href="sudoku.html">Sudoku</a>
      <a href="profile.html">Profile</a>
      <a href="signup.html">Sign Up</a>
      <a href="login.html">Log In</a>
    </nav>
    <div>
      <button id="theme-toggle" aria-label="Toggle theme">Dark Mode</button>
    </div>
  </header>

  <main>
    <div class="auth-wrap">
      <h2>Sign Up</h2>
      <div class="field">
        <label for="name">Full Name</label>
        <input id="name" type="text">
        <div id="err-name" class="error" style="display:none"></div>
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" type="email">
        <div id="err-email" class="error" style="display:none"></div>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password">
        <div id="err-pw" class="error" style="display:none"></div>
      </div>

      <div style="display:flex; gap:12px; align-items:center; margin-top:20px;">
        <button id="btnSignUp" class="primary">Sign Up</button>
        <a href="login.html" style="font-size:0.9rem; color:var(--link-color)">Already have an account?</a>
      </div>

      <div id="msg" style="margin-top:12px"></div>
    </div>
  </main>

  <footer>
    <p>© Amir Abil, Zerek Abdikassym — IT-2403</p>
  </footer>

  <script src="../src/js/auth.js"></script>
  <script>
    const nameEl = document.getElementById('name');
    const emailEl = document.getElementById('email');
    const pwEl = document.getElementById('password');
    const btn = document.getElementById('btnSignUp');
    const msg = document.getElementById('msg');

    function showErr(id, text) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.display = text ? 'block' : 'none';
      el.textContent = text || '';
    }

    btn.addEventListener('click', async () => {
      showErr('err-name',''); 
      showErr('err-email',''); 
      showErr('err-pw',''); 
      msg.textContent='';

      const username = nameEl.value.trim();
      const email = emailEl.value.trim();
      const password = pwEl.value;
      
      if (!username) { 
        showErr('err-name','Name is required'); 
        return; 
      }
      if (!email) { 
        showErr('err-email','Email is required'); 
        return; 
      }
      if (password.length < 6) { 
        showErr('err-pw','Password must be at least 6 characters'); 
        return; 
      }

      // Disable button during request
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const response = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          msg.innerHTML = `<div class="error">${data.message || 'Registration failed'}</div>`;
          btn.disabled = false;
          btn.textContent = 'Sign Up';
          return;
        }

        // Store token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('currentUser', data.email);
        localStorage.setItem('username', data.username);
        
        msg.innerHTML = '<div class="success">Account created! Redirecting to profile...</div>';
        setTimeout(() => location.href = 'profile.html', 1000);
      } catch (error) {
        console.error('Registration error:', error);
        msg.innerHTML = '<div class="error">Network error. Please try again.</div>';
        btn.disabled = false;
        btn.textContent = 'Sign Up';
      }
    });
  </script>

  <script src="../src/js/theme.js"></script>
</body>
</html>
