<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tanks — Game</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
  <header>
    <nav id="main-nav">
      <a href="index.html">Home</a>
      <a href="tictactoe.html">Tic Tac Toe</a>
      <a href="2048.html">2048</a>
      <a href="dino.html">Dino</a>
      <a href="tanks.html">Tanks</a>
      <a href="sudoku.html">Sudoku</a>
      <a href="profile.html">Profile</a>
      <a href="signup.html">Sign Up</a>
      <a href="login.html">Log In</a>
    </nav>
    <div>
      <button id="theme-toggle" aria-label="Toggle theme">Dark Mode</button>
    </div>
  </header>


  <main>
    <h2>💣 Tanks Battle (2 Players)</h2>
    <div class="controls" style="margin-bottom:20px;">
      <p style="margin:8px 0; font-weight:500;">🔴 Player 1: <strong>W A S D</strong> — move, <strong>G</strong> — shoot</p>
      <p style="margin:8px 0; font-weight:500;">🟢 Player 2: <strong>Arrow keys</strong> — move, <strong>/</strong> — shoot</p>
    </div>
    
    <div class="arena" id="arena"></div>
    
    
    <div class="mobile-controls">
      
      <div class="player-controls player1-controls">
        <div class="controls-label">🔴 P1</div>
        <div class="dpad">
          <button id="p1-up" class="control-btn up">↑</button>
          <div class="middle-row">
            <button id="p1-left" class="control-btn left">←</button>
            <button id="p1-shoot" class="control-btn shoot">🔥</button>
            <button id="p1-right" class="control-btn right">→</button>
          </div>
          <button id="p1-down" class="control-btn down">↓</button>
        </div>
      </div>
      
      
      <div class="player-controls player2-controls">
        <div class="controls-label">🟢 P2</div>
        <div class="dpad">
          <button id="p2-up" class="control-btn up">↑</button>
          <div class="middle-row">
            <button id="p2-left" class="control-btn left">←</button>
            <button id="p2-shoot" class="control-btn shoot">🔥</button>
            <button id="p2-right" class="control-btn right">→</button>
          </div>
          <button id="p2-down" class="control-btn down">↓</button>
        </div>
      </div>
    </div>
    
    <div style="margin-top:20px; display:flex; gap:12px; justify-content:center; align-items:center;">
      <button id="resetTanks" style="padding:10px 20px; font-size:1rem;">🔄 Reset Game</button>
      <a href="index.html" style="color:var(--link-color); text-decoration:none; font-weight:500;">← Back to Menu</a>
    </div>
  </main>

  <footer>
    <p>© Amir Abil, Zerek Abdikassym — IT-2403</p>
  </footer>

  <script src="../JavaScript/auth.js"></script>
  <script src="../JavaScript/tanks.js"></script>
  <script src="../JavaScript/theme.js"></script>
</body>
</html>
